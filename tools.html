<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدوات الذكاء الاصطناعي</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
    background: radial-gradient(circle at 50% 25%, #15324f, #0a1622);
    color:#fff; min-height:100vh; padding:32px 20px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  h1 { font-size:2rem; text-align:center; }
  .sub { color:rgba(255,255,255,0.7); font-size:1.05rem; text-align:center; margin-bottom:8px; }
  .grid {
    display:grid; grid-template-columns:repeat(4, 1fr); gap:20px;
    width:100%; max-width:1100px;
  }
  .card {
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
    border-radius:18px; padding:18px 14px; display:flex; flex-direction:column;
    align-items:center; gap:12px; text-decoration:none; color:#fff;
    transition:transform .2s, background .2s;
  }
  .card:hover { transform:translateY(-4px); background:rgba(255,255,255,0.09); }
  .card img { width:200px; height:200px; background:#fff; border-radius:12px; padding:6px; }
  .card .name { font-size:1.15rem; font-weight:600; }
  .card .url { color:#60a5fa; font-size:0.95rem; word-break:break-all; }
  @media (max-width:820px){ .grid { grid-template-columns:repeat(2, 1fr); } }
</style>
</head>
<body>
  <h1>🛠️ أدوات الذكاء الاصطناعي</h1>
  <p class="sub">امسح الكود بالكاميرا أو اضغط على الأداة لتدخلها مباشرة</p>
  <div class="grid">
    <a class="card" href="https://chat.openai.com/" target="_blank" rel="noopener">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https%3A%2F%2Fchat.openai.com%2F" alt="ChatGPT QR">
      <div class="name">💬 شات جي بي تي (ChatGPT)</div>
      <div class="url">chat.openai.com</div>
    </a>
    <a class="card" href="https://gemini.google.com/" target="_blank" rel="noopener">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https%3A%2F%2Fgemini.google.com%2F" alt="Gemini QR">
      <div class="name">✨ جيميناي (Gemini)</div>
      <div class="url">gemini.google.com</div>
    </a>
    <a class="card" href="https://labs.google/" target="_blank" rel="noopener">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https%3A%2F%2Flabs.google%2F" alt="Google Labs QR">
      <div class="name">🧪 جوجل لابس (Google Labs)</div>
      <div class="url">labs.google</div>
    </a>
    <a class="card" href="https://studio.abacus.ai/" target="_blank" rel="noopener">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https%3A%2F%2Fstudio.abacus.ai%2F" alt="Abacus AI Studio QR">
      <div class="name">🤖 استوديو آباكوس (Abacus)</div>
      <div class="url">studio.abacus.ai</div>
    </a>
  </div>
</body>
</html>
